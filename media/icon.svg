<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#313244"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Editor window frame -->
  <rect x="20" y="28" width="88" height="72" rx="6" fill="none" stroke="#cdd6f4" stroke-width="2.5" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="20" y="28" width="88" height="14" rx="6" fill="#45475a"/>
  <rect x="20" y="36" width="88" height="6" fill="#45475a"/>
  <!-- Title bar dots -->
  <circle cx="30" cy="35" r="2.5" fill="#f38ba8"/>
  <circle cx="38" cy="35" r="2.5" fill="#a6e3a1"/>
  <circle cx="46" cy="35" r="2.5" fill="#f9e2af"/>
  <!-- Code lines (focused content) -->
  <rect x="28" y="50" width="40" height="3" rx="1.5" fill="#89b4fa" opacity="0.8"/>
  <rect x="28" y="58" width="56" height="3" rx="1.5" fill="#cdd6f4" opacity="0.5"/>
  <rect x="28" y="66" width="32" height="3" rx="1.5" fill="#a6e3a1" opacity="0.6"/>
  <rect x="28" y="74" width="48" height="3" rx="1.5" fill="#cdd6f4" opacity="0.5"/>
  <rect x="28" y="82" width="24" height="3" rx="1.5" fill="#f5c2e7" opacity="0.6"/>
  <!-- Focus indicator - subtle glow -->
  <rect x="20" y="28" width="88" height="72" rx="6" fill="none" stroke="#89b4fa" stroke-width="1.5" opacity="0.4"/>
</svg>
