name: Publish to VS Code Marketplace

on:
    push:
        branches: [ main ]
        paths: [ package.json ]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Check if version changed
              id: version
              run: |
                  OLD=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
                  NEW=$(node -p "require('./package.json').version")
                  if [ "$OLD" = "$NEW" ]; then
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                    echo "value=$NEW" >> "$GITHUB_OUTPUT"
                  fi

            - uses: actions/setup-node@v4
              if: steps.version.outputs.skip == 'false'
              with:
                  node-version: 20

            - run: npm ci
              if: steps.version.outputs.skip == 'false'

            - run: npm run compile
              if: steps.version.outputs.skip == 'false'

            - run: npx @vscode/vsce publish
              if: steps.version.outputs.skip == 'false'
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Create git tag
              if: steps.version.outputs.skip == 'false'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "v${{ steps.version.outputs.value }}"
                  git push origin "v${{ steps.version.outputs.value }}"
